<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style>

      .title     { font: 700 18px 'Inter', sans-serif; fill: #0F172A; }
      .subtitle  { font: 11px 'Inter', sans-serif; fill: #64748B; }
      .node-name { font: 600 13px 'Inter', sans-serif; fill: #0F172A; }
      .node-sub  { font: 10px 'Inter', sans-serif; fill: #64748B; }
      .edge-lbl  { font: 500 10px 'Inter', sans-serif; fill: #64748B; }
      .footnote  { font: 10px 'Inter', sans-serif; fill: #64748B; opacity: 0.75; }
    </style>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="#FFFFFF"/>
  <text x="40" y="38" class="title">Multi-Agent Coordination · StateGraph + HITL</text>
  <text x="40" y="58" class="subtitle">5 agents ↔ TaskQueue ↔ DecisionBoundary ↔ HumanReviewQueue</text>
  <rect x="40" y="100" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="40" y="100" width="4" height="80" rx="2" fill="#0E7490"/>
  <text x="56" y="122" class="node-name">Postgres+pgvector</text>
  <text x="56" y="138" class="node-sub">tasks · audit</text>
  <rect x="260" y="100" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="260" y="100" width="4" height="80" rx="2" fill="#F97316"/>
  <text x="276" y="122" class="node-name">TaskQueue</text>
  <text x="276" y="138" class="node-sub">lease + advisory_lock</text>
  <rect x="480" y="100" width="280" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="480" y="100" width="4" height="80" rx="2" fill="#1B9AAA"/>
  <text x="496" y="122" class="node-name">LangGraph StateGraph</text>
  <text x="496" y="138" class="node-sub">5 specialised agents</text>
  <rect x="40" y="220" width="220" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="40" y="220" width="4" height="80" rx="2" fill="#DC2626"/>
  <text x="56" y="242" class="node-name">DecisionBoundary</text>
  <text x="56" y="258" class="node-sub">tool_class dispatch</text>
  <rect x="300" y="220" width="200" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="300" y="220" width="4" height="80" rx="2" fill="#2563EB"/>
  <text x="316" y="242" class="node-name">Reversible tools</text>
  <text x="316" y="258" class="node-sub">proceeds to next agent</text>
  <rect x="540" y="220" width="220" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="540" y="220" width="4" height="80" rx="2" fill="#DC2626"/>
  <text x="556" y="242" class="node-name">HumanReviewQueue</text>
  <text x="556" y="258" class="node-sub">blocks until approve / reject</text>
  <rect x="300" y="330" width="280" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
  <rect x="300" y="330" width="4" height="80" rx="2" fill="#1B9AAA"/>
  <text x="316" y="352" class="node-name">Operator UI</text>
  <text x="316" y="368" class="node-sub">/admin/review · approve / reject</text>
