<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="800" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1f2933">Multi-agent coordination via shared task queue</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,0 L5,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Task Queue box -->
  <g>
    <rect x="220" y="70" width="380" height="220" fill="#eef2ff" stroke="#4338ca" stroke-width="2" rx="8"/>
    <text x="410" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1b4b">Task Queue (Postgres)</text>

    <!-- Fields -->
    <g fill="#1f2937" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12">
      <text x="240" y="120">• task_id (PK)</text>
      <text x="240" y="140">• task_state: pending | running | completed | failed</text>
      <text x="240" y="160">• assigned_agent_id</text>
      <text x="240" y="180">• input_payload (JSONB)</text>
      <text x="240" y="200">• output_payload (JSONB)</text>
      <text x="240" y="220">• dependencies (JSONB)</text>
      <text x="240" y="240">• lease_until, retry_count, error_message</text>
    </g>

    <!-- Locking strategy callout -->
    <g>
      <rect x="240" y="255" width="340" height="25" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/>
      <text x="410" y="272" text-anchor="middle" font-size="11" fill="#78350f">SELECT ... FOR UPDATE SKIP LOCKED + pg_advisory_xact_lock(task_id)</text>
    </g>
  </g>

  <!-- Connector down to workers -->
  <line x1="410" y1="290" x2="410" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="420" y="318" font-size="11" fill="#475569">claim next pending task</text>

  <!-- Agent A box -->
  <g>
    <rect x="60" y="350" width="290" height="150" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/>
    <text x="205" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">Agent A (worker)</text>

    <g fill="#1f2937" font-size="11">
      <text x="80" y="400">• reads task queue</text>
      <text x="80" y="418">• does its work</text>
      <text x="80" y="436">• writes output</text>
      <text x="80" y="454">• marks task done</text>
      <text x="80" y="472">• may enqueue task for Agent C</text>
    </g>
  </g>

  <!-- Agent B box -->
  <g>
    <rect x="430" y="350" width="290" height="150" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/>
    <text x="575" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Agent B (worker)</text>

    <g fill="#1f2937" font-size="11">
      <text x="450" y="400">• reads task queue</text>
      <text x="450" y="418">• does its work</text>
      <text x="450" y="436">• writes output</text>
      <text x="450" y="454">• marks task done</text>
      <text x="450" y="472">• may enqueue task for Agent D</text>
    </g>
  </g>

  <!-- Loop arrows: workers write back to queue -->
  <path d="M 205 350 Q 205 320 410 305" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M 575 350 Q 575 320 410 305" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="160" y="328" font-size="10" fill="#15803d">complete / enqueue</text>
  <text x="600" y="328" font-size="10" fill="#b91c1c">complete / enqueue</text>

  <!-- Key property footer -->
  <text x="400" y="510" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Coordination is via shared state, not direct calls. Agent A never calls Agent B; it enqueues a task for Agent B.</text>
</svg>
