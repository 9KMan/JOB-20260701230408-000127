  <line x1="650" y1="260" x2="440" y2="330" stroke="#64748B" stroke-width="1.4" marker-end="url(#arrB)"/>
  <line x1="440" y1="410" x2="200" y2="370" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrB)"/>
