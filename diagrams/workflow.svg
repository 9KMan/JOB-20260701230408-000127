<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <style>
      .node-name { font: 600 13px ui-monospace, "SF Mono", monospace; fill: #0f172a; }
      .node-sub  { font: 10px ui-monospace, "SF Mono", monospace; fill: #94a3b8; }
      .arrow-lbl { font: 10px ui-monospace, "SF Mono", monospace; fill: #1e293b; }
      .branch-lbl{ font: 700 11px ui-monospace, "SF Mono", monospace; fill: #1e293b; }
      .title     { font: 700 18px ui-monospace, "SF Mono", monospace; fill: #0f172a; }
      .footnote  { font: 10px ui-monospace, "SF Mono", monospace; fill: #64748b; }
      .step-num  { font: 700 12px ui-monospace, "SF Mono", monospace; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <rect width="1200" height="760" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="34" class="title">AI Agentic Platform — Multi-Agent Task Workflow</text>
  <text x="40" y="54" class="footnote">POST /api/tasks → Postgres+pgvector → TaskQueue (lease) → LangGraph StateGraph → DecisionBoundary branch → RAG / approval → audit</text>

  <!-- Step 1: External client + FastAPI ingest -->
  <g>
    <circle cx="100" cy="100" r="16" fill="#fbbf24"/>
    <text x="100" y="105" class="step-num" text-anchor="middle">1</text>
    <rect x="40" y="125" width="160" height="60" rx="6" fill="#f8fafc"/>
    <rect x="40" y="125" width="160" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#334155" stroke-width="1.5"/>
    <text x="120" y="148" class="node-name" text-anchor="middle">External client</text>
    <text x="120" y="164" class="node-sub"  text-anchor="middle">Operator / Admin UI</text>

    <text x="120" y="200" class="arrow-lbl" fill="#fbbf24" text-anchor="middle">POST /api/tasks</text>
  </g>

  <!-- Step 2: FastAPI -->
  <g>
    <circle cx="320" cy="100" r="16" fill="#fbbf24"/>
    <text x="320" y="105" class="step-num" text-anchor="middle">2</text>
    <rect x="260" y="125" width="160" height="60" rx="6" fill="#f8fafc"/>
    <rect x="260" y="125" width="160" height="60" rx="6" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="340" y="148" class="node-name" fill="#0e7490" text-anchor="middle">FastAPI</text>
    <text x="340" y="164" class="node-sub"  text-anchor="middle">app/api/</text>

    <text x="340" y="200" class="arrow-lbl" fill="#22d3ee" text-anchor="middle">{ agent, input, … }</text>
  </g>

  <!-- Postgres + pgvector (database with vector support) -->
  <g>
    <circle cx="540" cy="100" r="16" fill="#fbbf24"/>
    <text x="540" y="105" class="step-num" text-anchor="middle">3</text>
    <rect x="460" y="125" width="200" height="80" rx="6" fill="#f8fafc"/>
    <rect x="460" y="125" width="200" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="560" y="148" class="node-name" fill="#6d28d9" text-anchor="middle">PostgreSQL + pgvector</text>
    <text x="560" y="166" class="node-sub"  text-anchor="middle">advisory lock support</text>
    <text x="475" y="184" class="node-sub">SELECT FOR UPDATE SKIP LOCKED</text>
    <text x="475" y="198" class="node-sub">pg_advisory_xact_lock</text>

    <text x="560" y="220" class="arrow-lbl" fill="#a78bfa" text-anchor="middle">INSERT tasks</text>
  </g>

  <!-- TaskQueue.claim_task -->
  <g>
    <rect x="460" y="270" width="200" height="60" rx="6" fill="#f8fafc"/>
    <rect x="460" y="270" width="200" height="60" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="560" y="294" class="node-name" fill="#0e7490" text-anchor="middle">TaskQueue.claim_task</text>
    <text x="560" y="310" class="node-sub"  text-anchor="middle">lease with TTL · heartbeat</text>

    <!-- DB → queue -->
    <line x1="540" y1="205" x2="540" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  </g>

  <!-- LangGraph StateGraph -->
  <g>
    <rect x="700" y="270" width="220" height="100" rx="8" fill="#f8fafc"/>
    <rect x="700" y="270" width="220" height="100" rx="8" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2"/>
    <text x="810" y="294" class="node-name" fill="#a16207" text-anchor="middle">LangGraph StateGraph.run_node</text>
    <text x="810" y="312" class="node-sub"  text-anchor="middle">scratchpad · LLM tool call</text>
    <text x="810" y="330" class="node-sub"  text-anchor="middle">asks: tool_class?</text>
    <text x="810" y="346" class="node-sub"  text-anchor="middle">— DecisionBoundary dispatcher</text>

    <!-- queue → graph -->
    <line x1="660" y1="300" x2="700" y2="300" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
    <text x="680" y="294" class="arrow-lbl" fill="#22d3ee" text-anchor="middle">claim_task_id</text>
  </g>

  <!-- Branching label -->
  <line x1="920" y1="320" x2="960" y2="320" stroke="#64748b" stroke-width="1"/>
  <text x="940" y="312" class="branch-lbl" fill="#1e293b" text-anchor="middle">tool class:</text>

  <!-- Branch A: Reversible → RAG retriever -->
  <g>
    <text x="980" y="262" class="branch-lbl" fill="#34d399">reversible</text>
    <rect x="960" y="270" width="180" height="60" rx="6" fill="#f8fafc"/>
    <rect x="960" y="270" width="180" height="60" rx="6" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="1.5"/>
    <text x="1050" y="294" class="node-name" fill="#047857" text-anchor="middle">RAG retriever</text>
    <text x="1050" y="310" class="node-sub"  text-anchor="middle">pgvector HNSW</text>

    <line x1="920" y1="305" x2="960" y2="305" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Branch B: Irreversible → DecisionBoundary → HumanReviewQueue → Operator UI -->
  <g>
    <text x="980" y="372" class="branch-lbl" fill="#fb7185">irreversible</text>
    <rect x="960" y="380" width="180" height="60" rx="6" fill="#f8fafc"/>
    <rect x="960" y="380" width="180" height="60" rx="6" fill="rgba(251,113,133,0.2)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="1050" y="404" class="node-name" fill="#be123c" text-anchor="middle">DecisionBoundary</text>
    <text x="1050" y="420" class="node-sub"  text-anchor="middle">ENQUEUE in HumanReviewQueue</text>

    <line x1="920" y1="345" x2="960" y2="410" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  </g>

  <!-- Operator UI -->
  <g>
    <rect x="960" y="475" width="180" height="60" rx="6" fill="#f8fafc"/>
    <rect x="960" y="475" width="180" height="60" rx="6" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="1050" y="499" class="node-name" fill="#a16207" text-anchor="middle">Operator UI</text>
    <text x="1050" y="515" class="node-sub"  text-anchor="middle">/admin/review · approve / reject</text>

    <line x1="1050" y1="440" x2="1050" y2="475" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
    <text x="1060" y="460" class="arrow-lbl" fill="#fb7185">approval</text>
  </g>

  <!-- Postgres enterprise_state + audit_log -->
  <g>
    <rect x="700" y="475" width="240" height="80" rx="6" fill="#f8fafc"/>
    <rect x="700" y="475" width="240" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="820" y="498" class="node-name" fill="#6d28d9" text-anchor="middle">Postgres</text>
    <text x="820" y="516" class="node-sub"  text-anchor="middle">enterprise_state + audit_log</text>
    <text x="715" y="534" class="node-sub">Postgres holds the canonical state</text>
    <text x="715" y="548" class="node-sub">and an append-only audit log per change.</text>

    <!-- RAG → Postgres -->
    <line x1="960" y1="370" x2="940" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="950" y="450" class="arrow-lbl" fill="#1e293b">retrieved docs</text>

    <!-- Operator approval → Postgres -->
    <line x1="960" y1="505" x2="940" y2="515" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

    <!-- LangGraph → Postgres (read state) -->
    <line x1="810" y1="370" x2="810" y2="475" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text x="816" y="430" class="footnote">read state</text>
  </g>

  <!-- Pipeline-runnable indicator: 1 → 2 → 3 arrows at top -->
  <line x1="200" y1="155" x2="260" y2="155" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <line x1="420" y1="155" x2="460" y2="155" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- Always-on band: observability + governance -->
  <g>
    <rect x="40" y="610" width="1120" height="80" rx="6" fill="#f8fafc"/>
    <rect x="40" y="610" width="1120" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="60" y="635" class="node-name" fill="#1e293b">Always-on (every stage)</text>

    <text x="60"  y="660" class="arrow-lbl" fill="#1e293b">Observability:</text>
    <text x="160" y="660" class="node-sub">loguru JSON · OTel traces · Prometheus counters</text>

    <text x="60"  y="678" class="arrow-lbl" fill="#1e293b">Governance:</text>
    <text x="160" y="678" class="node-sub">audit_log  ·  RBAC  ·  Pydantic v2 runtime validation on every payload</text>
  </g>

  <!-- Footer note -->
  <text x="40" y="730" class="footnote">All write paths into Postgres go through `src/merge.py::merge_fact()` (one writer) or via API endpoints that internally invoke the merge step.</text>
  <text x="40" y="746" class="footnote">Irreversible operations (send_email, deploy_code, mutate_record) require Operator UI approval before the audit_log records them as approved.</text>
</svg>
