<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740">
  <defs>
    <style>

      .title     { font: 700 18px 'Inter', sans-serif; fill: #1E3A8A; }
      .subtitle  { font: 11px 'Inter', sans-serif; fill: #6B7280; }
      .node-name { font: 600 13px 'Inter', sans-serif; fill: #1E3A8A; }
      .node-sub  { font: 10px 'Inter', sans-serif; fill: #6B7280; }
      .edge-lbl  { font: 600 10px 'Inter', sans-serif; fill: #F97316; }
      .footnote  { font: 10px 'Inter', sans-serif; fill: #6B7280; }
      .stage-tag { font: 700 11px 'Inter', sans-serif; fill: #F97316; letter-spacing: 1.2px; }
    </style>
  </defs>
  <rect width="1200" height="740" fill="#FFFFFF"/>
  <text x="40" y="38" class="title">AI Agentic Platform · Multi-Agent Task Pipeline</text>
  <text x="40" y="58" class="subtitle">POST /api/tasks → Postgres+pgvector → TaskQueue (lease) → LangGraph StateGraph → DecisionBoundary branch → audit</text>
  <rect x="40" y="110" width="160" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="40" y="110" width="160" height="6" rx="3" fill="#3B82F6"/>
  <rect x="40" y="113" width="160" height="3" fill="#3B82F6"/>
  <text x="54" y="134" class="stage-tag">01 · INGEST</text>
  <text x="54" y="156" class="node-name">Operator / API</text>
  <text x="54" y="174" class="node-sub">POST /api/tasks</text>
  <rect x="220" y="110" width="160" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="220" y="110" width="160" height="6" rx="3" fill="#3B82F6"/>
  <rect x="220" y="113" width="160" height="3" fill="#3B82F6"/>
  <text x="234" y="134" class="stage-tag">02 · VALIDATE</text>
  <text x="234" y="156" class="node-name">FastAPI + Pydantic</text>
  <text x="234" y="174" class="node-sub">api/tasks, agents, runs, review</text>
  <rect x="400" y="110" width="180" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="400" y="110" width="180" height="6" rx="3" fill="#F97316"/>
  <rect x="400" y="113" width="180" height="3" fill="#F97316"/>
  <text x="414" y="134" class="stage-tag">03 · QUEUE</text>
  <text x="414" y="156" class="node-name">Postgres + pgvector</text>
  <text x="414" y="174" class="node-sub">tasks · agents · runs · audit_log</text>
  <rect x="610" y="110" width="160" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="610" y="110" width="160" height="6" rx="3" fill="#F97316"/>
  <rect x="610" y="113" width="160" height="3" fill="#F97316"/>
  <text x="624" y="134" class="stage-tag">04 · LEASE</text>
  <text x="624" y="156" class="node-name">TaskQueue claim</text>
  <text x="624" y="174" class="node-sub">advisory_lock · lease with TTL</text>
  <rect x="790" y="110" width="180" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="790" y="110" width="180" height="6" rx="3" fill="#EA580C"/>
  <rect x="790" y="113" width="180" height="3" fill="#EA580C"/>
  <text x="804" y="134" class="stage-tag">05 · EXECUTE</text>
  <text x="804" y="156" class="node-name">LangGraph StateGraph</text>
  <text x="804" y="174" class="node-sub">scratchpad · LLM tool-call</text>
  <rect x="540" y="300" width="240" height="110" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="540" y="300" width="240" height="6" rx="3" fill="#2563EB"/>
  <rect x="540" y="303" width="240" height="3" fill="#2563EB"/>
  <text x="554" y="324" class="stage-tag">06a · REVERSIBLE</text>
  <text x="554" y="346" class="node-name">RAG retriever</text>
  <text x="554" y="364" class="node-sub">pgvector HNSW search</text>
  <rect x="820" y="300" width="240" height="110" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="820" y="300" width="240" height="6" rx="3" fill="#DC2626"/>
  <rect x="820" y="303" width="240" height="3" fill="#DC2626"/>
  <text x="834" y="324" class="stage-tag">06b · IRREVERSIBLE · HITL</text>
  <text x="834" y="346" class="node-name">DecisionBoundary</text>
  <text x="834" y="364" class="node-sub">rejects irreversible tools · ENQUEUE in HumanReviewQueue</text>
  <rect x="820" y="460" width="240" height="110" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
  <rect x="820" y="460" width="240" height="6" rx="3" fill="#1B9AAA"/>
  <rect x="820" y="463" width="240" height="3" fill="#1B9AAA"/>
  <text x="834" y="484" class="stage-tag">07 · APPROVAL</text>
  <text x="834" y="506" class="node-name">Operator UI</text>
  <text x="834" y="524" class="node-sub">/admin/review · approve / reject</text>
  <ellipse cx="300" cy="352.0" rx="80.0" ry="14" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="1.6"/>
  <path d="M 220.0 352.0
           v 36
           a 80.0 14 0 0 0 160.0 0
           v -36" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="1.6"/>
  <text x="300" y="410.0" class="node-name" text-anchor="middle">Postgres</text>
  <text x="300" y="426.0" class="node-sub" text-anchor="middle">enterprise_state + audit_log</text>
