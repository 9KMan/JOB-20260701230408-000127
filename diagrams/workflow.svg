      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
  </defs>
  <line x1="580" y1="175" x2="610" y2="175" stroke="#1E3A8A" stroke-width="2" marker-end="url(#arrC)"/>
  <defs>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
  </defs>
  <line x1="770" y1="175" x2="790" y2="175" stroke="#1E3A8A" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="860" y1="240" x2="660" y2="300" stroke="#1E3A8A" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="900" y1="240" x2="900" y2="300" stroke="#DC2626" stroke-width="2.4" marker-end="url(#arrC)"/>
  <line x1="940" y1="410" x2="940" y2="460" stroke="#1E3A8A" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="540" y1="300" x2="380" y2="370" stroke="#1E3A8A" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="820" y1="515" x2="380" y2="400" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="40" y="610" width="1120" height="100" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.2"/>
  <text x="60" y="635" class="node-name">always-on observability + governance  (every stage)</text>
  <text x="60" y="657" class="node-sub">Observability:  loguru JSON  ·  OpenTelemetry traces  ·  Prometheus counters  ·  Langfuse LLM traces</text>
  <text x="60" y="675" class="node-sub">Governance:     audit_log (every action attributed, blast-radius, policy_outcome)  ·  RBAC middleware</text>
  <text x="60" y="693" class="node-sub">Validation:     Pydantic v2 runtime validation on every inbound payload</text>
