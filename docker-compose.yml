services:
  # ---------------------------------------------------------------------
  # PostgreSQL + pgvector — unified structured and vector storage.
  # pgvector ships compiled into the official image so we never need a
  # custom Dockerfile. Bumped to pg16 for modern planner + partitioning.
  # ---------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_platform
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # Redis — task queue broker + working-memory store + cache.
  # Version 7 for stream consumer groups + ACL support.
  # ---------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: agentic_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------
  # API — FastAPI / uvicorn. Build from local context so dev mounts work
  # without rebuilding the image. Production would pin a tag.
  # ---------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:agentic_dev@postgres:5432/agentic_platform
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      # OPENAI_API_KEY and ANTHROPIC_API_KEY must be supplied via .env
      # or the orchestrator's secrets manager; never hard-coded.
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
  redisdata:
